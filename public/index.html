<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diaa Store — GPT Pay</title>
  <meta name="description" content="Diaa Store GPT Payment Link Generator" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background -->
  <div class="space-bg">
    <canvas id="starsCanvas"></canvas>
    <div class="dragon-layer">
      <img src="dragon.png" alt="" class="dragon-img" />
    </div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="4" stroke="var(--red)" stroke-width="1.5"/><path d="M12 7v4l3 2" stroke="var(--red)" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="logo-text-group">
          <div class="logo-title">DIAA STORE</div>
          <div class="logo-sub">GPT PAY</div>
        </div>
      </div>
      <a href="https://chatgpt.com/api/auth/session" target="_blank" class="btn-session-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Get Session
      </a>
    </header>

    <main class="main">
      <!-- Config Bar -->
      <div class="config-bar">
        <div class="config-group config-region">
          <label class="config-label">Offer Country <span class="label-hint">(promo source)</span></label>
          <div class="country-grid" id="offerToggle">
            <button class="country-btn" data-country="ID">🇮🇩 Indonesia</button>
            <button class="country-btn active" data-country="JP">🇯🇵 Japan <span class="country-cur">FREE</span></button>
            <button class="country-btn" data-country="US">🇺🇸 United States</button>
            <button class="country-btn" data-country="GB">🇬🇧 United Kingdom</button>
          </div>
        </div>
        <div class="config-group">
          <label class="config-label">Billing</label>
          <div class="toggle-group" id="billingToggle">
            <button class="toggle-btn active" data-country="ID">🇮🇩 IDR</button>
            <button class="toggle-btn" data-country="JP">🇯🇵 JPY</button>
            <button class="toggle-btn" data-country="US">🇺🇸 USD</button>
            <button class="toggle-btn" data-country="GB">🇬🇧 GBP</button>
          </div>
          <label class="config-label" style="margin-top:8px">Mode</label>
          <div class="toggle-group" id="modeToggle">
            <button class="toggle-btn active" data-mode="hosted">Hosted</button>
            <button class="toggle-btn" data-mode="embedded">Embedded</button>
          </div>
        </div>
      </div>

      <!-- Proxy -->
      <div class="input-section proxy-section">
        <div class="input-header">
          <span class="input-title">🌐 Proxy <span class="label-hint">(Japan IP for promo)</span></span>
        </div>
        <input type="text" class="proxy-input" id="proxyInput" placeholder="http://user:pass@host:port" spellcheck="false" />
      </div>

      <!-- Session Input -->
      <div class="input-section">
        <div class="input-header">
          <span class="input-title">Session JSON</span>
          <button class="btn-text" id="btnClear">Clear</button>
        </div>
        <textarea id="sessionInput" class="session-input" placeholder="Paste session JSON from chatgpt.com/api/auth/session ..." spellcheck="false"></textarea>
      </div>

      <!-- Generate -->
      <button class="btn btn-primary" id="btnGenerate">
        <div class="btn-shimmer"></div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Generate Link
      </button>

      <!-- Error -->
      <div class="error-bar hidden" id="errorBar">
        <span class="error-text" id="errorMessage"></span>
        <button class="error-dismiss" id="btnDismiss">&times;</button>
      </div>

      <!-- Result -->
      <div class="result-section hidden" id="resultSection">
        <div class="result-label" id="resultLabel">Payment Link</div>
        <div class="result-meta" id="resultMeta"></div>
        <div class="link-row">
          <input type="text" class="link-input" id="resultLink" readonly />
          <button class="btn-copy" id="btnCopy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Account Toast -->
    <div class="toast hidden" id="accountToast">
      <div class="toast-header">
        <span class="toast-title">Account Info</span>
        <button class="toast-close" id="toastClose">&times;</button>
      </div>
      <div class="toast-row"><span class="toast-label">Name</span><span class="toast-val" id="tName">—</span></div>
      <div class="toast-row"><span class="toast-label">Email</span><span class="toast-val" id="tEmail">—</span></div>
      <div class="toast-row"><span class="toast-label">Plan</span><span class="toast-val" id="tPlan">—</span></div>
      <div class="toast-row"><span class="toast-label">Expires</span><span class="toast-val" id="tExpires">—</span></div>
    </div>

    <footer class="footer">Diaa Store GPT Pay &copy; 2026</footer>
  </div>

  <!-- Loader -->
  <div class="loader-overlay hidden" id="loader">
    <div class="loader-ring"></div>
    <span class="loader-text">Generating payment link...</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
